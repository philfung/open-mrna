  <script>
    // Polyfill for Intl.v8BreakIterator using Intl.Segmenter
    if (!window.Intl.v8BreakIterator && window.Intl.Segmenter) {
      window.Intl.v8BreakIterator = function (locale, options) {
        this._segmenter = new Intl.Segmenter(locale, { granularity: options.type === 'word' ? 'word' : 'sentence' });
        this._text = "";
        this._segments = [];
        this._currentStep = 0;
      };
      window.Intl.v8BreakIterator.prototype.adoptText = function (text) {
        this._text = text;
        this._segments = Array.from(this._segmenter.segment(this._text));
        this._currentStep = 0;
      };
      window.Intl.v8BreakIterator.prototype.first = function () {
        this._currentStep = 0;
        return 0;
      };
      window.Intl.v8BreakIterator.prototype.next = function () {
        if (this._currentStep < this._segments.length) {
          const segment = this._segments[this._currentStep];
          this._currentStep++;
          return segment.index + segment.segment.length;
        }
        return -1;
      };
      window.Intl.v8BreakIterator.prototype.current = function () {
        if (this._currentStep === 0) return 0;
        if (this._currentStep <= this._segments.length) {
          const segment = this._segments[this._currentStep - 1];
          return segment.index + segment.segment.length;
        }
        return -1;
      };
      window.Intl.v8BreakIterator.prototype.breakType = function () {
        return 'none';
      };
    }
  </script>

  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #000000;
      margin: 0;
      padding: 0;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      position: absolute;
      top: 0;
      left: 0;
    }

    .loader {
      border: 4px solid #1C1C1E;
      border-radius: 50%;
      border-top: 4px solid #6366F1;
      width: 48px;
      height: 48px;
      -webkit-animation: spin 1s linear infinite;
      /* Safari */
      animation: spin 1s linear infinite;
    }

    @-webkit-keyframes spin {
      0% {
        -webkit-transform: rotate(0deg);
      }

      100% {
        -webkit-transform: rotate(360deg);
      }
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>

  <script>
    (function () {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      var isInstagram = ua.indexOf('Instagram') > -1;
      var isFacebook = !!ua.match(/FBAN|FBAV/);
      var isThreads = ua.indexOf('Threads') > -1;

      if (isInstagram || isFacebook || isThreads) {
        document.addEventListener('DOMContentLoaded', function () {
          var div = document.createElement('div');
          div.id = 'in-app-browser-warning';
          div.style.position = 'fixed';
          div.style.top = '0';
          div.style.left = '0';
          div.style.width = '100%';
          div.style.height = '100%';
          div.style.boxSizing = 'border-box';
          div.style.backgroundColor = 'rgba(0,0,0,0.98)';
          div.style.color = 'white';
          div.style.display = 'flex';
          div.style.flexDirection = 'column';
          div.style.justifyContent = 'center';
          div.style.alignItems = 'center';
          div.style.zIndex = '100000';
          div.style.padding = '24px';
          div.style.textAlign = 'center';
          div.style.fontFamily = 'Helvetica, Arial, sans-serif';

          div.innerHTML = '<h1 style="color: #6366F1; margin-bottom: 24px; font-size: 24px; width: 100%;">📱 Open in System Browser</h1>' +
            '<p style="font-size: 16px; line-height: 1.6; width: 100%; max-width: 400px; color: #E5E7EB; margin: 0 auto; overflow-wrap: break-word;">The Facebook and Instagram in-app browsers have limited support for this application.<br><br>For the best experience, please tap <b>"..."</b> and select <b>"Open in System Browser"</b> (Safari or Chrome).</p>';

          document.body.appendChild(div);
        });
      }
    })();
  </script>
</head>

<body>
  <div class="loading">

  </div>
